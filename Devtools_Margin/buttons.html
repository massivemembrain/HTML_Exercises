<!--CSS Box Model: Content, padding, border, margin
the space an element takes up-->
<style>
  .subscribe-button {
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
    /*Padding: the spacing on the inside of the button
    Better alternative to explicitly stating a fixed height and width*/
    padding-left: 16px;
    padding-right: 16px;
    padding-top: 10px;
    padding-bottom: 10px;
    transition: opacity 0.15s;
    vertical-align: top;
  }

  .subscribe-button:hover {
    opacity: .8;
  }

  .subscribe-button:active {
    opacity: .5;
  }
  
  .join-button {
    background-color: white;
    border-color: rgb(6, 95, 212);
    border-style: solid;
    /*Note: The border actually adds size to the button, will be a bit bigger than
    the button without the border*/
    border-width: 1px;
    color: rgb(6, 95, 212);
    border-radius: 2px;
    cursor: pointer;
    padding-left: 16px;
    padding-right: 16px;
    /*Offset the border size with less padding*/
    padding-top: 9px;
    padding-bottom: 9px;
    transition: background-color 0.15s,
      color 1s;
    vertical-align: top;
  }

  .join-button:hover {
    background-color: rgb(6, 95, 212);
    color: white;
  }

  .join-button:active {
    opacity: 0.7;
  }

  .tweet-button {
    background-color: rgb(2, 171, 255);
    color: white;
    border: none;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    margin-left: 8px;
    cursor: pointer;
    padding-left: 16px;
    padding-right: 16px;
    padding-top: 10px;
    padding-bottom: 10px;
    transition: box-shadow 0.15s;
    vertical-align: top;
  }


  .tweet-button:hover {
    /*Shadow when hovering over the property*/
    /*First value is horizontal, 2nd vertical, 3rd is blur, last is color*/
    box-shadow: 5px 5px 10px rgba(0,0,0,.15);
  }
</style>

<!--class attribute to distinguish between buttons for css-->
<button class="subscribe-button">
  SUBSCRIBE
</button>
<button class="join-button">
  JOIN
</button>
<button class="tweet-button">
  Tweet
</button>
