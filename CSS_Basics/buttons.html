<!--Cascading style sheet-->
<!--background-color is the CSS property, telling what we are changing-->
<!--red is the CSS value-->
<!--cursor property makes pointer turn into hand when hovering ove button-->
<!-- . indicates the style will target a class name, instead of all buttons-->

<!--Margin space outside -->

<style>
  .subscribe-button {
    background-color: rgb(200, 0, 0);
    color: white;
    border: none;
    height: 35px;
    width: 112px;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 8px;
  }
  
  .join-button {
    background-color: white;
    border-color: rgb(15, 102, 173);
    border-style: solid;
    border-width: 1px;
    color: rgb(15, 102, 173);
    height: 35px;
    width: 62px;
    border-radius: 2px;
    cursor: pointer;
  }

  .tweet-button {
    background-color: rgb(2, 171, 255);
    color: white;
    border: none;
    height: 35px;
    width: 74px;
    border-radius: 18px;
    font-weight: bold;
    font-size: 15px;
    margin-left: 8px;
    cursor: pointer;
  }
</style>

<!--class attribute to distinguish between buttons for css-->
<button class="subscribe-button">
  SUBSCRIBE
</button>
<button class="join-button">
  JOIN
</button>
<button class="tweet-button">
  Tweet
</button>
