<!DOCTYPE html>
<html> 
    <head>
        <title>13c</title>
        <style>
            p {
                font-family: Arial;
                margin: 0;
            }

            .card {
                display: flex;
                flex-direction: column;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 15px;
                padding-right: 15px;
                border-style: solid;
                border-color: rgb(151, 151, 151);
                border-width: 1px;
                border-radius: 4px;
                box-shadow: 0 0 5px rgba(0, 0, 0, 0.25);
                width: 400px;
                margin-top: 20px;
                margin-left: 20px;
            }

            .inbox {
                font-size: 14px;
                color: gray;
                margin-bottom: 20px;
            }

            .profile {
                display: flex;
                flex-direction: row;
                align-items: center;
                margin-bottom: 20px;
            }

            .pfp {
                object-fit: cover;
                width: 50px;
                height: 50px;
                border-radius: 25px;
            }
            
            .info {
                flex: 1;
                margin-left: 10px;
            }

            .name-flex {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 3px;
            }

            .name {
                font-weight: bold;
                font-size: 18px;
            }

            .time {
                font-size: 14px;
                color: gray;
            }

            .title {
                font-weight: bold;
                margin-bottom: 5px;
            }

            .description {
                color: gray;
            }


        </style>
    </head>
    <body>
        <div class="card">
            <p class="inbox">ALL INBOXES</p>
            <div class="profile">
                <img class="pfp" src="marquespfp.jpeg">
                <div class="info">
                    <div class="name-flex">
                        <p class="name">Chewy Promotions</p>
                        <p class="time">4:58 PM</p>
                    </div>
                    <p class="title">Biggest sales of the year!</p>
                    <p class="description">Hey there! We're writing to tell you about our...</p>

                </div>

            </div>
        </div>
    </body>
</html>
