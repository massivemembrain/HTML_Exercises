<!DOCTYPE html>
<html>
  <head>
    <title>13g</title>

    <style>
      p {
        font-family: Arial;
        font-size: 14px;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .tweet {
        display: flex;
        margin-top: 10px;
        margin-left: 10px;
        margin-right: 10px;
      }
      .pfp {
        object-fit: cover;
        object-position: top;
        width: 50px;
        height: 50px;
        border-radius: 25px;
        margin-right: 10px;
      }
      .content {
        width: 300px;
      }
      .username {
        font-weight: bold;
        margin-bottom: 4px;
      }
      .username-link {
        font-weight: normal;
        color: gray;
      }
      .link {
        margin-top: 10px;
        border-style: solid;
        border-radius: 20px;
        border-color: gray;
        border-width: 1px;

        display: flex;
        align-items: center;
        overflow: hidden;
      }
      .link-image {
        background-color: gray;
        width: 84px;
        height: 84px;
        margin-right: 10px;
      }
      .link-content {
        flex: 1;

      }
      .link-url {
        color: gray;
        margin-bottom: 4px;
        margin-top: 14px;
      }
      .link-title {
        line-height: 18px;
        margin-bottom: 14px;
      }

    </style>
  </head>
  <body>
    <div class="tweet">
      <img class="pfp" src="images.jpg">
      <div class="content">
        <p class="username">
          supersimple.dev <span class="username-link">@SuperSimpleDev</span>
        </p>
        <p class="tweet-writeup">
          What is backend web development? A complete overview. New video is up!
        </p>
        <div class="link">
          <div class="link-image"></div>
          <div class="link-content">
            <p class="link-url">youtube.com</p>
            <p class="link-title">Backend web development - a complete overview (2021)</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
