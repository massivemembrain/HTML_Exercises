<!DOCTYPE html>

<html> 
    <head>
        <title>9f</title>

        <style>
            .profile-card {
                height: 300px;
                width: 200px;

                box-shadow: 0px 2px 5px rgb(0, 0, 0, 0.25);

                margin-left: 10px;
            }

            .image {
                display: block;
                height: 200px;
                width: 200px;
                margin-bottom: 8px;

            }

            p {
                margin-top: 0;
                margin-left: 6px;
            }

            .name {
                font-weight: bold;
                margin-bottom: 4px;
            }

            .mutuals {
                color: rgb(65, 65, 65);

                margin-bottom: 10px;

            }

            .add {
                color: white;

                background-color: rgb(0, 106, 255);

                border-radius: 6px;
                border: none;

                margin-left: 6px;


                padding-top: 8px;
                padding-bottom: 8px;
                padding-left: 18px;
                padding-right: 18px;
            }
        </style>

    </head>
    <body>
        <div class="profile-card">
            <img class="image" src="Marques_Brownlee_cropped.jpg">
            <p class="name">Oliver</p>
            <p class="mutuals">2 mutual friends</p>
            <button class="add">Add Friend</button>
        </div>

    </body>
</html>
