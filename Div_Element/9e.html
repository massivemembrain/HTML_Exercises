<!DOCTYPE html>

<html>
    <head>
        <title>9e</title>

        <style>

            .prompt {
                width: 450px;
                margin-top: 20px;
                margin-left: 10px;
                border-radius: 8px;
                box-shadow: 3px 3px 10px rgba(0, 0, 0, 0.25);

                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 10px;
                padding-right: 10px
            }

            .mr-brownlee {
                height: 50px;
                width: 50px;
                object-fit: cover;
                border-radius: 25px;
                vertical-align: middle;
            }

            .tweet {
                width: 300px;
                color: rgb(100, 100, 100);
                padding-left: 10px;
                vertical-align: middle;
                border: none;
                font-size: 17px;
            }

            .button {
                color: white;
                font-weight: bold;

                padding-left: 16px;
                padding-right: 16px;
                padding-top: 10px;
                padding-bottom: 10px;
                vertical-align: middle;

                border: none;
                border-radius: 20px;
                background-color: rgb(3, 129, 233);

            }


        </style>
    </head>

    <body>
        <div class="prompt">
            <img class="mr-brownlee" src="Marques_Brownlee_cropped.jpg">
            <input class="tweet" type="text" placeholder="What's happing?">
            <button class="button">
                Tweet
            </button>
        </div>
    </body>
</html>
