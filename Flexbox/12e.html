<!DOCTYPE html>
<html>
  <head>
    <title>12e</title>
    <style>
      .box {
        border-style: solid;
        border-width: 1px;
        border-color: rgb(200, 200, 200);
        border-radius: 6px;
        width: 300px;
      }

      .flexy {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;

        padding-top: 6px;
        padding-bottom: 6px;
        padding-left: 12px;
        padding-right: 8px;
      }

      .flexy p {
        font-family: Arial;
        margin-top: 0;
        margin-bottom: 0px;
      }

      .flexy button {
        background-color: rgb(0, 132, 255);
        border-style: none;
        border-radius: 10px;

        font-weight: bold;
        color: white;
        margin-right: 8px;

        padding-left: 10px;
        padding-right: 10px;
        padding-top: 3px;
        padding-bottom: 3px;

      }

    </style>
  </head>
  <body>
    <div class="box">
      <div class="flexy">
        <p>Home</p>
        <button>14</button>
      </div>
      <div class="flexy">
        <p>Notifications</p>
        <button>3</button>
      </div>
      <div class="flexy">
        <p>Messages</p>
        <button>5</button>
      </div>

    </div>

  </body>
</html>
