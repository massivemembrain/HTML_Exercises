<!DOCTYPE html>

<html>
    <head>
        <title>Flexbox Practice</title>
    </head>
    <body>
        <!--we are ligning the elements horizontally-->
        <!--flex box naturally takes up as much space as it needs-->
        <div style="
            display: flex;
            flex-direction: row
            ">
            <div style="background-color:lightblue;">div 1 text</div>
            <div style="background-color:lightpink">div 2 <p>text</p></div>
            <!--p made both divs taller while maintaining alignment-->
        </div>

        <div style="
        margin-top: 30px;
            display: flex;
            flex-direction: row
            ">
            <div style="
            background-color: lightblue;
            width:100px;">100px</div>
            <div style="
            background-color: lightpink;
            flex: 1;
            ">flex: 1</div>
            <!--p made both divs taller while maintaining alignment-->
            <!--flex: 1 is the same as 1fr in grid, takes up the remaining space-->
        </div>

        <div style="
        margin-top: 30px;
            display: flex;
            flex-direction: row
            ">
            <div style="
            background-color: lightblue;
            width:100px;
            ">100px</div>
            <div style="
            background-color: lightpink;
            flex: 1;
            ">flex: 1</div>
            <div style="
            background-color: lightblue;
            flex: 2;
            ">flex: 2</div>
            <!--p made both divs taller while maintaining alignment-->
            <!--flex: 1 functions the same as 1fr in grid, takes up the remaining space-->
        </div>

    </body>
</html>
