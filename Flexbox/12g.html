<!DOCTYPE html>
<html>
  <head>
    <title>12g</title>

    <style>
      .recommendation {
        display: flex;
        flex-direction: row;
        align-items: center;
        margin-bottom: 20px;
      }

      .pfp {
        width: 50px;
        height: 50px;
        object-fit: cover;
        border-radius: 25px;
        margin-right: 8px;
      }

      .info {
        width: 200px;
      }

      .info p {
        font-family: Arial;
        margin: 0;
      }

      .name {
        font-weight: bold;
        margin-bottom: 3px;
      }

      .description,
      .popular {
        color: gray;
      }

      .description {
        margin-bottom: 5px;
      }

      .popular {
        font-size: 14px;
      }

      .follow-button {
        background-color: rgb(0, 132, 255);
        border: none;
        border-radius: 6px;

        font-size: 16px;
        font-weight: bold;
        color: white;
        margin-right: 8px;

        padding-left: 12px;
        padding-right: 12px;
        padding-top: 6px;
        padding-bottom: 6px;

        cursor: pointer;

      }


    </style>
  </head>
  <body>
    <div class="recommendation">
      <img class="pfp" src="marquespfp.jpeg">
      <div class="info">
        <p class="name">oliver</p>
        <p class="description">the cat</p>
        <p class="popular">Popular</p>
      </div>
      <button class="follow-button">Follow</button>
    </div>

  </body>
</html>
