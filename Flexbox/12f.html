<!DOCTYPE html>
<html>
  <head>
    <title>12f</title>

    <style>

      .search-bar {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;

        background-color: rgb(98, 50, 152);
        border: none;

        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 12px;
        padding-right: 6px;

      }

      .home {
        font-weight: bold;
        color: white;
        margin: 0;
        font-size: 14px;
        
      }

      .search {
        border: none;
        border-radius: 14px;
        padding-left: 12px;
        padding-top: 6px;
        padding-bottom: 6px;

        width: 250px;
      }

      .download {
        padding-top: 6px;
        padding-bottom: 6px;
        padding-left: 12px;
        padding-right: 12px;
        background: none;

        border-radius: 2px;
        border-style: solid;
        border-width: 1px;
        border-color: white;

        color: white;
      }

    </style>

  </head>
  <body style="font-family: Arial">
    <div class="search-bar">
      <p class="home">Home</p>
      <input class="search" type="text" placeholder="Search">
      <button class="download">Download</button>
    </div>

  </body>
</html>
