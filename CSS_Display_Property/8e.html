<!DOCTYPE html>

<html>
    <head>
        <title>8e</title>

        <style>
            .text {
                font-family: Arial;
                font-size: 24px;
                font-weight: bold;
                margin-bottom: 20px;
                margin-top: 10px;
            }

            .location {
                display: block;
                width: 280px;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 16px;

                margin-bottom: 10px;

                border-style: none;
                background-color: rgb(240, 240, 240);

            }

            .request,
            .schedule {
                font-family: Arial;

                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 16px;
                padding-right: 16px;

                margin-right: 10px;
                border-style: none;
            }

            .request {
                color: white;
                background-color: black;
                margin-top: 20px;
            }

            .schedule {
                background-color:rgb(240, 240, 240);
                color: rgb(44, 44, 44);


            }

        </style>

    </head>
    <body>
        <p class="text">
            Request a ride now
        </p>
        <input class="location" type="text" placeholder="Enter pickup location">
        <input class="location" type="text" placeholder="Enter destination">

        <button class="request">
            Request Now
        </button>
        <button class="schedule">
            Schedule for later
        </button>
    </body>
</html>
