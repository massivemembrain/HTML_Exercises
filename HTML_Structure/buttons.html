<!DOCTYPE html>

<html>
    <head>
        <title>
            Button
        </title>

        <!--Links this html file to the css stylesheet, rather than having it all within the same file-->
        <!--href is filepath-->
        <link rel="stylesheet" href="styles/buttons.css">
    </head>
    <body>
        <!--class attribute to distinguish between buttons for css-->
        <button class="subscribe-button">
            SUBSCRIBE
        </button>
        <button class="join-button">
            JOIN
        </button>
        <button class="tweet-button">
            Tweet
        </button>
    </body>
</html>
