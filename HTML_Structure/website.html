<!--From the first chapter, changing to the correct html structure-->
<!DOCTYPE html> <!--Tell brower to use a modern version of html-->
<html> <!--Says there is a webpage inside of the element, not much significance-->
    <!--Elements inside of other elements: Nesting-->
    <head> 
      <title>
        First Website
      </title>
    </head>
    <body> <!--All elements that are visible to us-->
      <p>
        paragraph of text
      </p>


      <button>Hello</button>

      <a href="https://www.youtube.com/" target="_blank">Link to Youtube</a>

    </body>
</html> <!--Represents an entire webpage, all files have only one webpage, with one head and one body-->
