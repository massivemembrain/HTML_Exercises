<!DOCTYPE html>

<html>
    <head>
        <title>10a</title>

        <style>
            p {
                font-family: Arial;
                margin-top: 0;
                margin-bottom: 6px;
                margin-left: 8px;
                font-size: 16px;
            }

            .name {
                font-weight: bold;
            }

            .description,
            .relationship {
                color: rgb(134, 134, 134);
                font-weight: 500;
                font-weight: bold;
                font-size: 15px;
            }

            .relationship {
                margin-bottom: 0;
            }
            .profile {
                height: 75px;
                width: 400px;
                vertical-align: center;
            }

            .pfp {
                display: inline-block;
                object-fit: cover;
                object-position: top;
                width: 65px;
                height: 65px;
                border-radius: 50px;
            }

            .pfp-box,
            .profile-info,
            .follow-box {
                display: inline-block;
                vertical-align: middle;
            }

            .profile-info {
                width: 200px;
            }


            .follow-button {
                color: white;
                background-color: rgb(0, 162, 255);

                font-weight: bold;

                border: none;
                border-radius: 6px;
                padding-top: 8px;
                padding-bottom: 8px;
                padding-left: 8px;
                padding-right: 8px;

            }

        </style>

    </head>
    <body>
        <div class="profile">
            <div class="pfp-box">
                <img class="pfp" src="images.jpg">
            </div>  
            <div class="profile-info">
                <p class="name">oliver</p>
                <p class="description">the cat</p>
                <p class="relationship">Popular</p>
            </div>
            <div class="follow-box">
                <button class="follow-button">Follow</button>
            </div>
            
        </div>

    </body>
</html>
