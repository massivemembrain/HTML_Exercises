<!DOCTYPE html>

<html>
    <head>
        <title>11d</title>

        <style>
            .friend-grid {
                display: grid;
                grid-template-columns: 200px 200px 200px;
                column-gap: 16px;
            }

            .friend {
                display: grid;
                grid-template-rows: 200px 30px 20px 50px;
                align-items: center;
                box-shadow: 0px 1px 6px rgb(0, 0, 0, .15)

            }

            .profile-picture {
                width: 100%;
                height: 100%;
            }
            p {
                font-family: Arial;
                font-size: 14px;
            }
            .profile-name {
                font-weight: bold;
                margin-left: 6px;
            }
            .profile-mutuals {
                color: rgb(96, 96, 96);
                margin-left: 6px;
            }
            .follow-button {
                color: white;
                background-color: rgb(0, 140, 255);
                border: none;

                width: 60%;

                padding-top: 8px;
                padding-bottom: 8px;
                padding-left: 20px;
                padding-right: 20px;

                border-radius: 4px;
                margin-left: 6px;
            }


        </style>

    </head>

    <body>
        <div class="friend-grid">
            <div class="friend">
                <img class="profile-picture" src="Marques_Brownlee_cropped.jpg">
                <p class="profile-name">Oliver</p>
                <p class="profile-mutuals">2 mutual friends</p>
                <button class="follow-button">Add Friend</button>
            </div>
            <div class="friend">
                <img class="profile-picture" src="Marques_Brownlee_cropped.jpg">
                <p class="profile-name">Mimi</p>
                <p class="profile-mutuals">3 mutual friends</p>
                <button class="follow-button">Add Friend</button>

            </div>
            <div class="friend">
                <img class="profile-picture" src="Marques_Brownlee_cropped.jpg">
                <p class="profile-name">Rex</p>
                <p class="profile-mutuals">4 mutual friends</p>
                <button class="follow-button">Add Friend</button>
            </div>
        </div>
    </body>
</html>
