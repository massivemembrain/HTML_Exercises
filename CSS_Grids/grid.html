<!DOCTYPE html>

<!--Grid: a layout -->

<html>
    <head>
        <title>Grid Practice</title>
    </head>
    <body>
        <!--length of first column, length of second column, num of values determine number of columns-->
        <div style="
            display: grid;
            grid-template-columns: 100px 100px;
        ">
            <!--inline styles-->
            <div style="background-color:lightblue;">div1</div>
            <div style="background-color: lightpink;">div2</div>

        </div>


        <div style="
            margin-top: 30px;
            display: grid;
            grid-template-columns: 100px 100px 200px;
        ">
            <!--inline styles-->
            <div style="background-color:lightblue;">100px</div>
            <div style="background-color: lightpink;">100px</div>
            <div style="background-color:lightblue;">200px</div>

        </div>


        <!--Using multiple fr things turns them into ratios, 
        where they take up the remaining space-->
        <div style="
            margin-top: 30px;
            display: grid;
            grid-template-columns: 100px 1fr 2fr;
        ">
            <!--inline styles-->
            <div style="background-color:lightblue;">100px</div>
            <div style="background-color: lightpink;">1fr</div>
            <div style="background-color:lightblue;">2fr</div>

        </div>
    </body>

</html>
