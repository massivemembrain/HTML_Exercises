<!DOCTYPE html>

<html>
    <head>
        <title>Youtube Clone </title>
    </head>
    <style>
        /*images keep dimension unless you alter the width AND the height*/
        .thumbnail {
            width: 300px;
            display: block;
        }

        .search-bar {
            display: block;
        }

        .video-title {
            width: 300px;
        }

        .video-preview {
            width: 300px;
            display: inline-block;
            vertical-align: top;
            margin-right: 15px;
        }
        
    </style>
    <body>
        <!--Text boxes, or checkbox -->
        <input class="search-bar" type="text" placeholder="Search">

        <div class="video-preview">
            <img class="thumbnail" src="thumbnails/thumbnail-1.webp">

            <p class="video-title">
                Talking Tech and AI with Google CEO Sundar Pichai!
            </p>
            <p class="video-author">
                Marques Brownlee
            </p>
            <p class="video-stats">
                3.4M views &#183; 6 months ago
            </p>
        </div>

        <div class="video-preview">
            <img class="thumbnail" src="thumbnails/thumbnail-2.webp">

            <p class="video-title">
                Try Not To Laugh Challenge #9
            </p>
            <p class="video-author">
                Markiplier
            </p>
            <p class="video-stats">
                19M views &#183; 4 years ago
            </p>
        </div>
    </body>
</html>

<!--Cover will maintain its dimensions, but the image will likely be cut off
Conatin will show the entire image sacrificing extra white space
object-postition pairs with object fit-->

<!--Lesson 8:
Display property in CSS is the reason paragraphs always get a new line while other elements do not
Block element: an element that takes up the entire line: ex. a paragraph
Inline block element: only take sup as much space as it needs to
Inline elements: Nested within a text ex strong, u, span
We can manipulate the type of element using the display property-->

<!--div stands for division, but it is just a box
By default it is a block element
why use it? it can contain any other elements within it: it's a container
block elements in div cannot exceed the dimensions of the div-->
